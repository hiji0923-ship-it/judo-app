<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越谷柔道会 管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.screen{display:none}.screen.active{display:block}
.page{display:none}.page.active{display:block}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0ede8;min-height:100vh;color:#1a1a1a;font-size:14px}
/* ===== LOGIN ===== */
.login-bg{min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;inset:0;background:var(--logo-bg) center/contain no-repeat;opacity:0.08}
.login-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.5);position:relative;z-index:1}
.login-logo{width:90px;height:90px;border-radius:50%;background:var(--logo-bg) center/cover;margin:0 auto 1rem;border:3px solid #c9a84c;box-shadow:0 4px 20px rgba(201,168,76,0.4)}
/* ===== NAVBAR ===== */
.navbar{background:#fff;border-bottom:1px solid #e8e4df;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nav-brand{font-size:15px;font-weight:700;color:#222}
.nav-right{display:flex;align-items:center;gap:8px}
.role-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px}
.rb-master{background:#f59e0b;color:#fff}
.rb-teacher{background:#dbeafe;color:#1e3a5f}
.rb-student{background:#d1fae5;color:#064e3b}
/* ===== NAV MENU ===== */
.nav-menu{background:#fff;border-bottom:1px solid #e8e4df;padding:10px 20px 0;display:flex;flex-wrap:wrap;gap:6px}
.nav-item{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid #e0dbd5;cursor:pointer;color:#555;background:#fff;margin-bottom:6px;font-family:inherit}
.nav-item:hover:not(.active){background:#f7f5f2}
.nav-item.active{border-color:#7c6bd6;background:#f0eeff;color:#5b4cc4;font-weight:600}
/* ===== STUDENT TABS ===== */
.student-tabs{padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap}
.stab{font-size:13px;padding:6px 16px;border-radius:8px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555;font-family:inherit}
.stab:hover:not(.active){background:#f7f5f2}
.stab.active{border-color:#7c6bd6;background:#f0eeff;color:#5b4cc4;font-weight:600}
/* ===== MAIN ===== */
.main{padding:0 20px 40px}
/* ===== CARDS ===== */
.profile-card{background:#fff;border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av-g{background:#5cb89a}.av-p{background:#7c6bd6}.av-b{background:#3b82f6}.av-o{background:#f59e0b}
.profile-name{font-size:16px;font-weight:700;color:#222}
.profile-meta{font-size:12px;color:#888;margin-top:3px}
.course-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.cp-enjoy{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.cp-athlete{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
.belt-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:8px}
.belt-white{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.belt-mizu{background:#bfdbfe;color:#0c4a6e;border:1px solid #93c5fd}
.belt-yellow{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.belt-orange{background:#fed7aa;color:#7c2d12;border:1px solid #fdba74}
.belt-green{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.belt-purple{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}
.belt-brown{background:#d4a373;color:#3b1f0a;border:1px solid #a16207}
.belt-black{background:#1f2937;color:#f9fafb;border:1px solid #374151}
.stats-row{display:flex;margin-bottom:10px;background:#fff;border-radius:14px;overflow:hidden}
.stat-cell{flex:1;text-align:center;padding:15px 10px;border-right:1px solid #f0ede8}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:11px;color:#999;margin-bottom:4px}
.stat-val{font-size:21px;font-weight:700}
.sv-gr{color:#10b981}.sv-dk{color:#222}
.section-card{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:10px}
.sec-title{font-size:14px;font-weight:700;color:#333;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.edit-btn{font-size:12px;border:1px solid #ddd;border-radius:8px;padding:4px 12px;cursor:pointer;color:#555;background:#fff;font-family:inherit}
.edit-btn:hover{background:#f7f5f2}
.dot-g{width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block;margin-right:6px}
.dot-b{width:8px;height:8px;border-radius:50%;background:#3b82f6;display:inline-block;margin-right:6px}
.wish-group{margin-bottom:10px}
.wish-label{font-size:12px;color:#888;margin-bottom:6px;display:flex;align-items:center}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag-g{font-size:12px;padding:4px 12px;border-radius:99px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.tag-b{font-size:12px;padding:4px 12px;border-radius:99px;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.cat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;background:#e0f2fe;color:#0369a1;margin-bottom:10px;display:inline-block}
.tech-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f5f2ef}
.tech-item:last-child{border-bottom:none}
.tech-left{display:flex;align-items:center;flex:1}
.tech-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.tech-cb.on{background:#5cb89a;border-color:#5cb89a}
.tech-cb.on::after{content:"✓";color:#fff;font-size:11px;font-weight:700}
.fav-cb-wrap{width:18px;height:18px;border-radius:5px;border:1.5px solid #f59e0b;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-left:6px}
.fav-cb-wrap.on{background:#f59e0b;border-color:#f59e0b}
.fav-cb-wrap.on::after{content:"★";color:#fff;font-size:10px;line-height:1}
.fav-cb-wrap.disabled{opacity:0.25;pointer-events:none}
.tech-name{font-size:13px;color:#333;margin-left:8px}
.tech-labels{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ts-done{font-size:12px;color:#10b981;font-weight:600}
.ts-no{font-size:12px;color:#bbb}
.fav-tag{font-size:11px;color:#d97706;font-weight:700}
.mastered-box{background:#f0fdf4;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid #bbf7d0}
.mastered-title{font-size:12px;font-weight:700;color:#166534;margin-bottom:8px}
.mastered-tags{display:flex;flex-wrap:wrap;gap:5px}
.m-tag{font-size:12px;padding:3px 10px;border-radius:99px;background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.tokui-box{background:#fffbeb;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid #fde68a}
.tokui-title{font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px}
.tokui-tags{display:flex;flex-wrap:wrap;gap:5px}
.t-tag{font-size:12px;padding:3px 10px;border-radius:99px;background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.em{font-size:12px;color:#aaa;font-style:italic}
.tech-legend{display:flex;align-items:center;gap:12px;font-size:11px;color:#999;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:4px}
.inner-tabs{display:flex;gap:0;border-bottom:1px solid #e8e4df;margin-bottom:0}
.itab{font-size:13px;padding:9px 20px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;font-weight:600}
.itab.active{color:#1e40af;border-bottom-color:#3b82f6}
/* ===== PARAM SCREEN ===== */
.wp{background:#0c1829;border-radius:12px;padding:20px;color:#fff}
.wp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #1e3a5f}
.wp-player{display:flex;align-items:center;gap:12px}
.wp-av{width:46px;height:46px;border-radius:50%;background:#0f2744;border:2px solid #3b82f6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.wp-name{font-size:16px;font-weight:700;color:#fff}
.wp-sub{font-size:12px;color:#60a5fa;margin-top:2px}
.wp-score-block{text-align:right}
.wp-score-num{font-size:28px;font-weight:700;color:#60a5fa;line-height:1}
.wp-score-label{font-size:11px;color:#3b6ea8;margin-top:2px}
.wp-body{display:grid;grid-template-columns:1fr 176px;gap:14px;margin-bottom:14px}
.wp-params{display:flex;flex-direction:column;gap:8px}
.wp-prow{display:flex;align-items:center;gap:10px}
.wp-plabel{font-size:13px;font-weight:600;color:#fff;min-width:64px}
.wp-track{flex:1;height:10px;background:#071120;border-radius:99px;overflow:hidden;border:1px solid #1e3a5f}
.wp-fill{height:100%;border-radius:99px;background:#3b82f6;transition:width .25s}
.wp-num-input{width:38px;padding:3px 4px;border-radius:6px;border:1px solid #1e3a5f;background:#071120;color:#fff;font-size:13px;font-weight:700;text-align:center;font-family:inherit}
.wp-num-input:focus{outline:none;border-color:#3b82f6}
.wp-stars{font-size:14px;color:#3b82f6;letter-spacing:1px;min-width:74px}
.wp-stars .off{color:#1e3a5f}
.wp-radar{background:#071120;border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;border:1px solid #1e3a5f}
.wp-radar-label{font-size:11px;font-weight:600;color:#3b6ea8;margin-bottom:8px;letter-spacing:.05em}
.wp-section{background:#071120;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #1e3a5f}
.wp-sec-title{font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:8px;letter-spacing:.05em}
.wp-note{font-size:12px;color:#3b6ea8;margin-bottom:8px}
.wp-tokui-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:24px}
.wp-tokui-tag{font-size:12px;padding:3px 10px;border-radius:99px;background:#0f2744;color:#fff;border:1px solid #1e3a5f}
.wp-ta{width:100%;background:#0c1829;border:1px solid #1e3a5f;border-radius:8px;padding:8px 10px;font-size:13px;color:#fff;resize:vertical;min-height:56px;font-family:inherit}
.wp-ta:focus{outline:none;border-color:#3b82f6}
.wp-save{width:100%;margin-top:10px;padding:9px;border-radius:8px;background:#1e40af;border:1px solid #3b82f6;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.wp-save:hover{background:#1d4ed8}
.wp-divider{border:none;border-top:1px solid #1e3a5f;margin:12px 0}
/* ===== OTHER ===== */
.notice{border-radius:8px;padding:8px 12px;font-size:13px;margin:0 20px 12px;display:none}
.notice-ok{background:#e8f8f1;border:1px solid #a3e4c1;color:#1a5e35}
.notice-err{background:#fdf0f0;border:1px solid #f5c6c6;color:#c0392b}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.metric{background:#fff;border-radius:12px;padding:14px 10px;text-align:center}
.metric-label{font-size:11px;color:#999;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:700}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;font-family:inherit}
.btn:hover{background:#f7f5f2}
.btn-primary{background:#2c5282;color:#fff;border-color:#2c5282}
.btn-success{background:#27ae60;color:#fff;border-color:#27ae60}
.btn-danger{color:#c0392b;border-color:#c0392b}
.btn-block{width:100%;padding:11px;font-size:14px}
.check-box{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f5f4f0}
.check-box.done{background:#27ae60;border-color:#27ae60;color:#fff}
.item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e8e6e0;font-size:13px}
.item-row:last-child{border-bottom:none}
.sel-list{min-height:38px;background:#f5f4f0;border-radius:8px;padding:7px 10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.member-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:12px;margin:2px}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:14px;color:#666;z-index:999}
.spinner{width:32px;height:32px;border:3px solid #e8e6e0;border-top-color:#2c5282;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chip-sel{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#666;margin:3px;user-select:none}
.chip-sel.on-c{background:#e8f8f1;border-color:#27ae60;color:#1a5e35;font-weight:500}
.chip-sel.on-p{background:#ebf4ff;border-color:#2c5282;color:#1e3a5f;font-weight:500}
.chip-sel.on-plan{font-weight:500}
input[type=text],input[type=password],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4a90d9}
textarea{resize:vertical;line-height:1.6}
.err{color:#c0392b;font-size:13px;margin-top:6px;display:none}

input::placeholder{color:rgba(255,255,255,0.3);}
#screen-login input:focus{outline:none;border-color:rgba(184,146,42,0.6)!important;background:rgba(255,255,255,0.1)!important;}

#screen-login input::placeholder{color:rgba(255,255,255,0.25);}
#screen-login input:focus{outline:none;border-color:rgba(201,162,39,0.5)!important;}
</style>
</head>

function calcProgress(sid){
  let total=0,done=0;
  planCats.forEach(cat=>{
    const items=cat.beltGroups?cat.beltGroups.flatMap(bg=>bg.items):cat.items;
    items.forEach(item=>{total++;if(waza[sid]&&waza[sid][cat.id+'|'+item])done++;});
  });
  return total>0?Math.round(done/total*100):0;
}

// ===== Firebase =====
async function loadAll(){
  showLoading(true);
  try{
    const u=await fbGet('app/users');
    if(u&&u.data){
      appUsers=u.data;
      // masterとsenseiが存在しない場合は追加して保存
      let needSave=false;
      if(!appUsers['master']){appUsers['master']={name:'マスター',role:'master',pw:'master123',studentId:null};needSave=true;}
      if(!appUsers['sensei']){appUsers['sensei']={name:'指導員',role:'teacher',pw:'sensei123',studentId:null};needSave=true;}
      if(needSave)await fbSet('app/users',{data:appUsers});
    } else {
      await fbSet('app/users',{data:appUsers});
    }

    const s=await fbGet('app/students');
    if(s&&s.list){
      students=s.list.map(st=>({
        course:'enjoy',
        params:{tachi:0,ne:0,physical:0,stamina:0,mental:0},
        traits:'',notes:'',
        ...st
      }));
    }
    else await fbSet('app/students',{list:students});

    const g=await fbGet('app/goals');if(g&&g.data)goals=g.data;
    else await fbSet('app/goals',{data:goals});

    const w=await fbGet('app/waza');if(w&&w.data)waza=w.data;
    else await fbSet('app/waza',{data:waza});

    const c=await fbGet('app/curriculum');if(c&&c.list)curriculum=c.list;
    else await fbSet('app/curriculum',{list:curriculum});

    const pc=await fbGet('app/planCats');if(pc&&pc.list)planCats=pc.list;
    else await fbSet('app/planCats',{list:planCats});

    const gg=await fbGet('app/gradeGroups');if(gg&&gg.list)gradeGroups=gg.list;
    else await fbSet('app/gradeGroups',{list:gradeGroups});

    const kd=await fbGet('app/keyDuty');if(kd){if(kd.members)keyMembers=kd.members;if(kd.duty)keyDuty=kd.duty;}
    else await fbSet('app/keyDuty',{members:keyMembers,duty:keyDuty});

    const ce=await fbGet('app/calEvents');if(ce&&ce.list)calEvents=ce.list;
    else await fbSet('app/calEvents',{list:calEvents});

    const st=await fbGet('app/settings');if(st)showDemo=st.showDemo!==false;
    else await fbSet('app/settings',{showDemo:true});
  }catch(e){console.error(e);}
  showLoading(false);
}

function buildTechRows(sid){
  const groups=getWazaGroups();
  return groups.map(g=>{
    const rows=g.items.map(item=>{
      const isDone=!!(waza[sid]&&waza[sid][g.catId+'|'+item]);
      const isFav=!!(waza[sid]&&waza[sid]['fav:'+g.catId+'|'+item]);
      const enc=encodeURIComponent(item);
      return '<div class="tech-item">'
        +'<div class="tech-left">'
        +'<div class="tech-cb'+(isDone?' on':'')+'" onclick="ttn(this)" data-sid="'+sid+'" data-catid="'+g.catId+'" data-item="'+enc+'"></div>'
        +'<div class="fav-cb-wrap'+(isFav?' on':'')+(!isDone?' disabled':'')+'" onclick="tfn(this)" data-sid="'+sid+'" data-catid="'+g.catId+'" data-item="'+enc+'"></div>'
        +'<span class="tech-name">'+item+'</span>'
        +'</div>'
        +'<div class="tech-labels">'
        +'<span class="'+(isDone?'ts-done':'ts-no')+'">'+(isDone?'習得済み':'未習得')+'</span>'
        +(isFav?'<span class="fav-tag">★得意</span>':'')
        +'</div></div>';
    }).join('');
    return '<div style="margin-bottom:14px"><div class="cat-badge">'+g.name+'</div>'+rows+'</div>';
  }).join('');
}

window.toggleTechNew=async function(sid,catId,item){
  if(!waza[sid])waza[sid]={};

function buildWazaHtml(sid,filter,b1,b2,editable){
  const bgi=BELT_LIST.indexOf(getStudentById(sid).belt||'白帯');
  let html='';
  planCats.forEach(cat=>{
    const cc=CAT_COLORS[cat.ci%CAT_COLORS.length];
    let itemRows='';
    const mkRow=(item,isDone,extra)=>{
      const attrs=editable?' onclick="twz(this)" data-sid="'+sid+'" data-catid="'+cat.id+'" data-item="'+encodeURIComponent(item)+'"':'';
      return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e8e6e0;font-size:13px">'
        +extra
        +'<div class="check-box'+(isDone?' done':'')+'"'+attrs+'>'+(isDone?'✓':'')+'</div>'
        +'<span style="color:'+(isDone?'#1a1a1a':'#999')+'">'+item+'</span>'
        +'<span style="margin-left:auto;font-size:11px;color:'+(isDone?'#27ae60':'#bbb')+'">'+(isDone?'習得済み':'未習得')+'</span></div>';
    };
    if(cat.beltGroups){
      cat.beltGroups.forEach(bg=>{
        if(filter==='current'){
          const bgBeltIdx=BELT_LIST.findIndex(b=>bg.belt.includes(b));
          if(bgBeltIdx>bgi)return;
        } else if(filter==='range'){
          const lo=Math.min(BELT_LIST.indexOf(b1),BELT_LIST.indexOf(b2));
          const hi=Math.max(BELT_LIST.indexOf(b1),BELT_LIST.indexOf(b2));
          const bgBeltIdx=BELT_LIST.findIndex(b=>bg.belt.includes(b));
          if(bgBeltIdx<lo||bgBeltIdx>hi)return;
        }
        bg.items.forEach(item=>{
          const isDone=!!(waza[sid]&&waza[sid][cat.id+'|'+item]);
          const extra='<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:'+bg.color+';color:'+bg.tc+';flex-shrink:0">'+bg.belt.split('（')[0]+'</span>';
          itemRows+=mkRow(item,isDone,extra);
        });
      });
    } else {
      cat.items.forEach(item=>{
        const isDone=!!(waza[sid]&&waza[sid][cat.id+'|'+item]);
        itemRows+=mkRow(item,isDone,'');
      });
    }
    if(!itemRows)return;
    html+='<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;background:'+cc.bg+';color:'+cc.text+';display:inline-block;margin-bottom:8px">'+cat.name+'</div>'+itemRows+'</div>';
  });
  return html||'<div style="font-size:13px;color:#888">表示する技がありません</div>';
}

  return html;
}

function buildPlanText(){
  if(planSelected.size===0)return '練習項目を選択してください';
  const today=new Date();
  const dateStr=today.getFullYear()+'/'+(today.getMonth()+1)+'/'+today.getDate();
  let target='';
  if(planMode==='individual'){
    const s=getStudentById(planSid);
    target=s.name+'（'+(getGoals(planSid).grade||'-')+'・'+s.belt+'）';
  } else {
    const g=gradeGroups.find(g=>g.id===planGid);
    if(g){const mems=g.mids.map(id=>students.find(s=>s.id===id)).filter(Boolean);target='【'+g.name+'】全'+mems.length+'名\n  '+mems.map(s=>s.name).join('、');}
  }
  const grouped={};
  planSelected.forEach(key=>{
    const [catId,item]=key.split('::');
    const cat=planCats.find(c=>c.id==catId);
    const n=cat?.name||'その他';
    if(!grouped[n])grouped[n]=[];
    grouped[n].push(item);
  });
  let text='【練習計画】'+dateStr+'\n対象：'+target+'\n━━━━━━━━━━━━\n';
  Object.entries(grouped).forEach(([cat,items])=>{text+='▶ '+cat+'\n';items.forEach(i=>text+='  ・'+i+'\n');});
  const memo=document.getElementById('plan-memo')?.value||'';
  if(memo)text+='━━━━━━━━━━━━\n📝 '+memo+'\n';
  text+='━━━━━━━━━━━━\nこの練習計画をもとに詳細な指導メニューを作成してください。';
  return text;
}

window.execBulk=async function(){
  const title=document.getElementById('bulk-title')?.value.trim()||'練習';
  const type=document.getElementById('bulk-type')?.value||'practice';
  const checked=[];for(let i=0;i<7;i++){const cb=document.getElementById('bday-'+i);if(cb&&cb.checked)checked.push(i);}
  if(checked.length===0){showNotice('曜日を選択してください','err');return;}
  const days=new Date(calY,calM,0).getDate();let count=0;
  for(let d=1;d<=days;d++){
    const dow=new Date(calY,calM-1,d).getDay();if(!checked.includes(dow))continue;
    const ds=calY+'-'+String(calM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(!calEvents.find(e=>e.date===ds&&e.title===title)){calEvents.push({id:calEventNextId++,date:ds,title,type});count++;}
  }
  await fbSet('app/calEvents',{list:calEvents});
  showNotice(count+'件の予定を一括登録しました');renderCalendar();
};

window.genKeyDuty=async function(){
  if(keyMembers.length===0){showNotice('メンバーを追加してください','err');return;}
  keyDuty=[];const start=new Date();let d=new Date(start);let idx=0;
  for(let i=0;i<52;i++){
    while(d.getDay()!==5)d.setDate(d.getDate()+1);
    keyDuty.push({date:d.toISOString().split('T')[0],member:keyMembers[idx%keyMembers.length]});
    idx++;d.setDate(d.getDate()+7);
  }
  await fbSet('app/keyDuty',{members:keyMembers,duty:keyDuty});
  showNotice('当番表を生成しました');renderKey();renderCalendar();
};

function getWazaGroups(){
  const groups=[];
  planCats.forEach(cat=>{
    if(cat.id===6&&cat.beltGroups){
      cat.beltGroups.forEach(bg=>{
        groups.push({catId:cat.id,name:bg.belt,items:bg.items||[]});
      });
    } else if(cat.items&&cat.items.length){
      groups.push({catId:cat.id,name:cat.name,items:cat.items});
    }
  });
  return groups;
}

      +'<div><div class="profile-name">'+s.name+'</div>'
      +'<div class="profile-meta">'+s.belt+' / 在籍'+s.months+'ヶ月 / 出席'+(s.attendance||0)+'%</div></div></div>'
      +'<div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#10b981">'+pct+'%</div>'
      +'<div style="font-size:11px;color:#aaa">習得率</div></div></div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

// ===== 生徒管理 =====
function renderStudents(){
  const el=document.getElementById('page-students');if(!el)return;
  if(students.length===0){el.innerHTML='<div class="section-card"><div class="em">生徒がいません</div></div>';return;}
  let sid=selStudentTab;
  if(!students.find(s=>s.id===sid))sid=students[0].id;
  selStudentTab=sid;
  renderStudentTabsBar();
  if(!el.querySelector('#student-detail')){
    el.innerHTML='<div id="student-detail"></div>';
  }
  renderStudentDetail(sid);
}

// ===== カリキュラム =====
function renderCurriculum(){
  const el=document.getElementById('page-curriculum');if(!el)return;
  let html='<div class="section-card"><div class="sec-title">📅 カリキュラム</div>';
  if(!curriculum||curriculum.length===0){
    html+='<div class="em">カリキュラムが登録されていません</div>';
  } else {
    html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'
      +'<thead><tr style="background:#f5f4f0">'
      +'<th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e8e6e0">日付</th>'
      +'<th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e8e6e0">テーマ</th>'
      +'<th style="padding:8px 12px;text-align:left;border-bottom:1px solid #e8e6e0">内容</th></tr></thead><tbody>';
    curriculum.forEach((c,i)=>{
      html+='<tr style="border-bottom:1px solid #f0ede8'+(i%2===0?';background:#fff':';background:#fafaf8')+'">'
        +'<td style="padding:8px 12px;white-space:nowrap">'+c.date+'</td>'
        +'<td style="padding:8px 12px;font-weight:600">'+c.theme+'</td>'
        +'<td style="padding:8px 12px;color:#555">'+c.content+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

// ===== 起動 =====
(async()=>{
await loadAll();
updateDemoSection();
showScreen('login');
showLoading(false);
})();
</script>
